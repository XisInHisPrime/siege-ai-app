<!DOCTYPE html>
<html>

<head>
<title>SiegeMind AI</title>
<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="container">

<h1>SiegeMind AI</h1>
<p>Rainbow Six Siege Stat Analyzer</p>

<input id="gamertag" placeholder="Enter Gamertag">
<br><br>

<input id="gamertag2" placeholder="Compare With Player">
<br><br>

<select id="platform">
<option>Xbox</option>
<option>PlayStation</option>
<option>PC</option>
</select>

<br><br>

<button onclick="analyzeStats()">Analyze Stats</button>

<div id="results" class="card"></div>

<h3>Stat Overview</h3>
<canvas id="statChart" width="400" height="200"></canvas>

</div>

<script src="script.js"></script>

</body>
</html>
